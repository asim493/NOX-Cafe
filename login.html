<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOX Café — Secure Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-noir: #07070F;
            --card-dark: #141427;
            --card-mid: #1A1A30;
            --gold-primary: #C8A96E;
            --gold-light: #E8D5B0;
            --gold-gradient: linear-gradient(135deg, #FFD77A 0%, #C8A96E 50%, #8B6914 100%);
            --cream-text: #F0E8D0;
            --font-display: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --error-accent: #FF6B35;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background-color: var(--bg-noir);
            color: var(--cream-text);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow: hidden;
        }

        #particleCanvas {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .gateway-wrapper {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .logo-frame {
            position: relative;
            padding: 16px 36px;
            border: 1px solid rgba(200, 169, 110, 0.2);
            margin-bottom: 30px;
            background: rgba(7, 7, 15, 0.8);
            text-align: center;
        }
        .logo-frame::before, .logo-frame::after {
            content: ''; position: absolute; width: 8px; height: 8px; border: 2px solid var(--gold-primary);
        }
        .logo-frame::before { top: -4px; left: -4px; border-right: none; border-bottom: none; }
        .logo-frame::after { bottom: -4px; right: -4px; border-left: none; border-top: none; }

        .logo-text {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .logo-subtitle {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--gold-light);
            margin-top: 4px;
        }

        .login-card {
            background-color: var(--card-dark);
            border: 1px solid rgba(200, 169, 110, 0.15);
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .login-card h2 {
            font-family: var(--font-display);
            font-size: 1.75rem;
            color: #FFFFFF;
            margin-bottom: 6px;
            text-align: center;
        }

        .login-card p {
            font-size: 0.85rem;
            color: rgba(240, 232, 208, 0.5);
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold-primary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background-color: var(--card-mid);
            border: 1px solid rgba(200, 169, 110, 0.15);
            border-radius: 4px;
            padding: 12px 16px;
            color: #FFFFFF;
            font-family: var(--font-body);
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(200, 169, 110, 0.15);
        }

        #errorMessage {
            color: var(--error-accent);
            font-family: var(--font-code);
            font-size: 0.8rem;
            margin-bottom: 16px;
            text-align: center;
            display: none;
        }

        .btn-submit {
            width: 100%;
            background: transparent;
            border: 1px solid var(--gold-primary);
            color: var(--gold-primary);
            padding: 14px;
            border-radius: 4px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--gold-primary);
            color: var(--bg-noir);
            box-shadow: 0 0 15px rgba(200, 169, 110, 0.3);
        }

        @keyframes cardEntrance {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="gateway-wrapper">
        <div class="logo-frame">
            <div class="logo-text">NOX</div>
            <div class="logo-subtitle">Café & Codes</div>
        </div>

        <div class="login-card">
            <h2>Authorized Access</h2>
            <p>Provide validation credentials to view active matrices</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Operator Identifier</label>
                    <input type="text" id="username" class="form-control" placeholder="e.g. nox_root" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">Security Cryptokey</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <div id="errorMessage"></div>
                
                <button type="submit" class="btn-submit">Verify Identity</button>
            </form>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.radius = Math.random() * 1.5 + 0.5;
                this.alpha = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 169, 110, ${this.alpha})`; ctx.fill();
            }
        }

        for (let i = 0; i < 60; i++) particles.push(new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    window.location.href = data.redirectTo;
                } else {
                    errorDiv.innerText = `✕ ${data.message || 'Access Denied'}`;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerText = '✕ System transmission failure';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
